---
default_settings: &git_defaults
  repoURL: https://github.com/rhpds/zt-workbench-create-automation
  targetRevision: main

deployer:
  domain: apps.cluster.example.com
  apiUrl: https://api.cluster.example.com:6443

platform:
  enabled: true
  git:
    path: cluster/platform/bootstrap
    <<: *git_defaults

rhoaiOperator:
  enabled: true
  git:
    path: cluster/infra/bootstrap/rhoai-operator
    <<: *git_defaults

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: showroom-userdata
  namespace: {{ .Values.showroom.namespace }}
data:
  user_data.yml: |
    "guid": "{{ .Values.showroom.guid }}"
    "user": "{{ .Values.showroom.user }}"
    "password": "{{ .Values.showroom.password }}"
    "openshift_api_url": "{{ .Values.deployer.apiUrl }}"
    "openshift_console_url": "https://console-openshift-console.{{ .Values.deployer.domain }}"
    "openshift_cluster_ingress_domain": "{{ .Values.deployer.domain }}"
    "rhoai_dashboard_url": "https://rh-ai.{{ .Values.deployer.domain }}"
    "project_name": "{{ .Values.showroom.projectName }}"
    "workbench_name": "{{ .Values.showroom.workbenchName }}"

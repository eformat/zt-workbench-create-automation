---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: showroom
  namespace: {{ .Values.showroom.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: showroom
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: showroom
    spec:
      serviceAccountName: showroom
      initContainers:
        - name: git-cloner
          image: {{ .Values.showroom.images.gitCloner }}
          env:
            - name: GIT_REPO_URL
              value: {{ .Values.showroom.gitRepoUrl }}
            - name: GIT_REPO_REF
              value: {{ .Values.showroom.gitRepoRef }}
            - name: CLONE_DIR
              value: /showroom/repo
          volumeMounts:
            - name: showroom-files
              mountPath: /showroom/repo
              subPath: repo
        - name: antora-builder
          image: {{ .Values.showroom.images.antora }}
          env:
            - name: FILES_DIR
              value: /showroom/repo
            - name: OUTPUT_DIR
              value: /showroom/www
            - name: ANTORA_SITE_FILE
              value: {{ .Values.showroom.antoraPlaybook }}
            - name: ANTORA_ENABLE_DEV_MODE
              value: "false"
          volumeMounts:
            - name: showroom-files
              mountPath: /showroom/repo
              subPath: repo
            - name: user-data
              mountPath: /user_data/
            - name: showroom-files
              mountPath: /showroom/www
              subPath: www
      containers:
        - name: content
          image: {{ .Values.showroom.images.content }}
          env:
            - name: GIT_REPO_URL
              value: {{ .Values.showroom.gitRepoUrl }}
            - name: GIT_REPO_REF
              value: {{ .Values.showroom.gitRepoRef }}
            - name: ANTORA_PLAYBOOK
              value: {{ .Values.showroom.antoraPlaybook }}
            - name: ZT_BUNDLE
              value: {{ .Values.showroom.ztBundle }}
            - name: ZT_UI_ENABLED
              value: {{ .Values.showroom.ztUiEnabled | quote }}
            - name: SHOWROOM_UI_CONFIG
            - name: DOMAIN
              value: {{ .Values.deployer.domain }}
            - name: GUID
              value: {{ .Values.showroom.guid }}
            - name: USER
              value: {{ .Values.showroom.user }}
          ports:
            - containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: user-data
              mountPath: /user_data/
            - name: showroom-files
              mountPath: /showroom/repo
              subPath: repo
            - name: showroom-files
              mountPath: /showroom/www
              subPath: www
        - name: nginx
          image: {{ .Values.showroom.images.nginx }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8080
              name: web
              protocol: TCP
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-pid
              mountPath: /var/run
      volumes:
        - name: showroom-files
          emptyDir: {}
        - name: user-data
          configMap:
            name: showroom-userdata
        - name: nginx-config
          configMap:
            name: showroom-proxy-config
        - name: nginx-pid
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: showroom-cluster-setup
rules:
  - apiGroups: ["operator.openshift.io"]
    resources: ["ingresscontrollers"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: showroom-cluster-setup
subjects:
  - kind: ServiceAccount
    name: showroom
    namespace: {{ .Values.showroom.namespace }}
roleRef:
  kind: ClusterRole
  name: showroom-cluster-setup
  apiGroup: rbac.authorization.k8s.io
